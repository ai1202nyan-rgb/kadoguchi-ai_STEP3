<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせフォーム</title>
  <!-- ↓ CSSファイルを読み込んでください「style.css」にすること -->
  <link rel="stylesheet" href="test-3-1.css">
</head>

<header>
    <!-- ここに見出しと説明文を追加 -->
     <h2>世界一甘いお店</h2>
  </header>

  <!-- ナビゲーション（ul, li, aを使用） -->
 <div class="main-container">
  <nav> 
    <ul>
      <li><a href="#section1">トップ</a></li><a href="任意"></a>
      <li><a href="#section2">新着情報</a></li><a href="任意"></a>
      <li><a href="#section3">おすすめのスイーツ</a></li><a href="任意"></a>
      <li><a href="#section4">お問い合わせ</a></li><a href="任意"></a>
    </ul>
  </nav>

  <main>
  <table>
  <table border="4">
<!-- フォーム開始 --> 
<form action="#" method="post">  
      <!-- TODO: 名前入力欄を作成（label + input） -->
     <tr>
      <th>お名前</th>
      <td>
      <input type="text" id="name" name="name" size="40">
      </td>
      </tr>

        <!-- TODO: お近くのお店を作成 -->
      <tr>
      <th>お近くのお店</th>
      <td>
      <select id="store" name="store">
        <option value="hokkaido/tohoku">北海道・東北</option>
        <option value="kanto">関東</option>
        <option value="chubu">中部</option>
        <option value="kansai">関西</option>
        <option value="chugoku/sikoku">中国・四国</option>
        <option value="kyushu/okinawa">九州・沖縄</option>
      </select>
      </td>
      </tr>

        <!-- TODO: 電話入力欄（textarea） -->
      <tr>
      <th>電話</th>
      <td>
      <input type="text" id="phone"name="phone" size="40">
      </td>
      </tr>

        <!-- TODO: 電話番号入力欄 -->
      <tr>
        <th>電話番号</th>
      <td>
      <input type="telphone" id="telphone" name="telphone" size="40">
      </td>
      </tr>

        <!-- TODO: メールアドレス入力欄-->
      <tr>
      <th>メールアドレス</th>
      <td>
      <input type="email" id="email" name="email" size="40">
      </td>
      </tr>

        <!-- TODO:　お問い合わせ種別-->
      <tr>
      <th>お問い合わせ種別</th>
      <td>
      <input type="radio" name="inquiry type" value="item" id="item">
      <label for="item">商品について</label>

      <input type="radio" name="inquiry type" value="employee">
      <label for="employee">従業員について</label>
      </td>
      </tr>

        <!-- TODO:　お問い合わせ内容-->
      <tr>
      <th>お問い合わせ内容</th>
      <td>
      <textarea id="inquiry content" name="inquiry content"placeholder="詳細を入力してください"row="5" cols="30" ></textarea>
    </td>
      </tr>
      </table>
      
        <!--送信ボタン-->
        <button type="submit">送信</button>

      </form>

  </main>
  </div>

  <footer> 
    
  </footer>

</body>
</html>
